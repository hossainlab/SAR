    <style>
        :root {
            scrollbar-gutter: stable;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfd;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(79, 70, 229, 0.4);
        }

        /* RStudio Cobalt Theme Simulation */
        pre[class*="language-"] {
            background: #002240 !important;
            margin: 0 !important;
            padding: 1rem !important;
            border-radius: 0 !important;
            font-family: 'Fira Code', monospace !important;
            line-height: 1.5 !important;
            font-size: 13px !important;
        }
        .token.comment { color: #0088FF !important; font-style: italic; }
        .token.punctuation { color: #f8f8f2 !important; }
        .token.number, .token.constant, .token.boolean { color: #FF628C !important; }
        .token.string { color: #3AD900 !important; }
        .token.keyword { color: #FF9D00 !important; }
        .token.function { color: #9EFFFF !important; }
        
        /* Mobile-first adjustments */
        @media (max-width: 640px) {
            pre[class*="language-"] {
                padding: 0.75rem !important;
                font-size: 12px !important;
            }
        }
    </style>
